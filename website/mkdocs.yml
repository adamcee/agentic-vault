site_name: The Agentic Vault
site_description: A domain-agnostic, AI-native knowledge base template designed to stop context loss and hallucination in LLM coding and planning sessions.
site_author: The Crusty Engineer

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - roamlinks
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Installation:
    - Quickstart: installation/quickstart.md
    - The AI Setup Wizard: installation/wizard.md
    - Tooling Alternatives: installation/tooling-alternatives.md
  - The Methodology:
    - Design & Goals: methodology/design-and-goals.md
    - The SYSTEM.md Primacy: methodology/system-primacy.md
    - The Session Protocol: methodology/session-protocol.md
    - Decision Records (ADRs/PDRs): methodology/decision-records.md
    - The Reweave Protocol: methodology/reweave-protocol.md
    - Research Traceability: methodology/research-traceability.md
    - Evidence Maturity: methodology/evidence-maturity.md
    - Wikilink Discipline: methodology/wikilink-discipline.md
    - The Ideas Lifecycle: methodology/ideas-lifecycle.md
    - The Ingestion Gate: methodology/ingestion-gate.md
    - Personas as Constraint: methodology/personas-as-constraint.md
    - AI Writing Discipline: methodology/writing-discipline.md
    - Sources & Further Reading: methodology/sources.md
  - The Example Vault (BrewTrack): example/README.md
