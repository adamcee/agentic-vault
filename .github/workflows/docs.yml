name: Deploy Docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        working-directory: website
        run: pip install -r requirements.txt
        
      - name: Deploy
        working-directory: website
        run: mkdocs gh-deploy --force
